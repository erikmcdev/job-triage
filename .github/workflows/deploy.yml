name: Deploy
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          docker build -t test-image .
          docker run --rm -v ${{ github.workspace }}/tests:/app/tests -v ${{ github.workspace }}/pyproject.toml:/app/pyproject.toml test-image sh -c "pip install pytest httpx && pytest tests/"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/job-triage
            git fetch origin && git reset --hard origin/main
            docker compose pull
            DOMAIN=${{ secrets.DOMAIN }} docker compose up -d
